# Coolify (or `docker compose up`) deploys this directly. Fill in the ${VARS}
# via Coolify's environment variables UI, or a root .env file for local
# testing. JWT_SECRET must be identical across api/web/panel.
#
# Postgres is included here for a simple single-VPS setup. If you'd rather
# use Coolify's managed Postgres service instead, delete the `postgres`
# service below and point DATABASE_URL at that instead.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tekliflercepte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tekliflercepte}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tekliflercepte}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-tekliflercepte}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tekliflercepte}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN}
      PANEL_ORIGIN: ${PANEL_ORIGIN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
    volumes:
      - api_uploads:/app/apps/api/uploads
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    ports:
      - "3002:3002"

  panel:
    build:
      context: .
      dockerfile: apps/panel/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  api_uploads:
